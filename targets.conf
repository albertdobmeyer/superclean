# targets.conf - optional extra folders to age out at the --clean level.
#
# One target per line:   path|days|label
#   path   absolute folder to scan (recursively) for old files
#   days   delete files older than this many days (optional, default 30)
#   label  friendly name shown in output (optional, defaults to the path)
#
# At --clean, each target is offered for deletion (auto-confirmed with --yes,
# previewed with --dry-run). Missing folders are skipped. Empty file = no-op.
#
# This is where machine-specific cleanup lives, so the core script stays generic.
#
# ----- "Albert mode" (the author's setup, left here as worked examples) -----
#   F:\TOOLS\STABLE_DIFFUSION\outputs\txt2img-images|30|SD WebUI txt2img
#   F:\TOOLS\COMFYUI\output|30|ComfyUI output
#
# ----- other ideas -----
#   D:\renders|14|Video renders
#   C:\Users\me\Downloads\__scratch|7|Download scratch
