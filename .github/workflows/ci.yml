name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src
      - name: Test
        run: pytest -q
      - name: Smoke (read-only + dry-run, never destructive)
        run: |
          superclean --version
          superclean report --json
          superclean protected --json
          superclean sweep --dry-run --json
          superclean clean --dry-run --yes --json
          superclean init --json
          superclean last --json

  no-em-dashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject unicode dashes
        run: |
          if grep -rlP '[\x{2012}-\x{2015}]' --include='*.py' --include='*.ps1' \
               --include='*.md' --include='*.toml' --include='*.conf' . ; then
            echo "Unicode dash found. Use a plain hyphen."
            exit 1
          fi
          echo "No unicode dashes."
