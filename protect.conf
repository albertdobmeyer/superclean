# protect.conf - extra process names superclean must never touch.
#
# Lines starting with # are comments. One EXE base name per line (no .exe).
# These add to the built-in baseline in core/protect.ps1 (Cursor, VS Code,
# Claude, ollama, Windows Terminal, etc.) and apply to ALL levels.
#
# Add anything you keep open during a work session that superclean might
# otherwise see as an orphan or trim. Examples:
#   windsurf
#   zed
#   neovide
#   warp
#   wezterm
#   nvim
#   goland
#   rider
