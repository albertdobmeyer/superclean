# services.conf - optional extra local services to health-check in --report.
#
# One service per line:   label|url
#   label  name shown in the report
#   url    HTTP endpoint that returns 200 when the service is up
#
# superclean always checks the local Ollama daemon by default. Anything you add
# here is checked in addition. Missing/unreachable services just show as
# "Not running". Empty file = only the default Ollama check runs.
#
# ----- "Albert mode" (the author's setup, left here as worked examples) -----
#   SD WebUI (7860)|http://localhost:7860/sdapi/v1/options
#   ComfyUI (8188)|http://localhost:8188/system_stats
#
# ----- other ideas -----
#   Local API (3000)|http://localhost:3000/health
#   Postgres admin|http://localhost:5050
